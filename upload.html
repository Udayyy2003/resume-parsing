<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;
        }
    </style>
</head>
<body>
    <h2>Upload Resume</h2>
    <div id="flash-message"></div>
    
    <form id="upload-form" action="/api/upload" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>
        
        <div class="form-group">
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Mobile Number:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        
        <div class="form-group">
            <label for="resume">Resume (PDF/DOCX):</label>
            <input type="file" id="resume" name="resume" accept=".pdf,.docx" required>
        </div>
        
        <button type="submit">Upload</button>
    </form>

    <script>
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const uploadBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = uploadBtn.textContent;
            
            try {
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'Uploading...';
                
                const formData = new FormData();
                formData.append('first_name', e.target.first_name.value);
                formData.append('last_name', e.target.last_name.value);
                formData.append('email', e.target.email.value);
                formData.append('phone', e.target.phone.value);
                formData.append('resume', e.target.resume.files[0]);
                
                const response = await fetch('http://127.0.0.1:5000/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                const flashDiv = document.getElementById('flash-message');
                flashDiv.innerHTML = '';
                
                if (response.ok) {
                    // Show success message + user details
                    const message = `
                        <div class="flash success">
                            <strong>Resume Submitted Successfully!</strong><br>
                            Score: ${result.final_score}/10 (${result.status})<br><br>
                            <strong>Applicant Details:</strong><br>
                            Name: ${result.user_details.first_name} ${result.user_details.last_name}<br>
                            Email: ${result.user_details.email}<br>
                            Phone: ${result.user_details.phone}
                        </div>
                    `;
                    flashDiv.innerHTML = message;
                } else {
                    flashDiv.innerHTML = `<div class="flash error">Error: ${result.error}</div>`;
                }
            } catch (error) {
                document.getElementById('flash-message').innerHTML = 
                    `<div class="flash error">Network error: ${error.message}</div>`;
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = originalBtnText;
            }
        });
        </script>
</body>
</html>
